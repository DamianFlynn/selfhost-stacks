# n8n - Workflow Automation Platform
#
# Purpose:
#   Self-hosted workflow automation tool for connecting apps and services
#   Alternative to Zapier/Make with visual workflow editor
#
# Key Features:
#   - Visual workflow builder with 400+ integrations
#   - Custom function nodes (JavaScript/Python)
#   - Webhook triggers and HTTP requests
#   - Schedule-based automation
#   - Error handling and retry logic
#   - Credential management and encryption
#
# Workflow:
#   Trigger (webhook/schedule/manual) → Process nodes → Actions → External APIs
#
# Access:
#   URL: https://n8n.deercrest.info
#   Middleware: chain-authelia (protected - admin only)
#

services:

  n8n:    
    hostname: "n8n"
    container_name: "n8n"
    # Run the container process as the TrueNAS 'apps' numeric UID/GID so mounted
    # dataset ownership (568:568) matches the process identity and avoids EACCES
    # on host-mounted files. This keeps the dataset owned by TrueNAS and is the
    # recommended pattern on TrueNAS SCALE.
    user: "568:568"
    #image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    image: ghcr.io/damianflynn/custom-n8n:2.11.1
    env_file:
      - /mnt/fast/stacks/stacks/selfhosted/automation/.env
    depends_on:
      n8n-db:
        condition: service_healthy
    # Environment variables (explanations below)
    environment:
      - N8N_HOST=n8n.${DOMAINNAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.deercrest.info/
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      # When running as a numeric UID that may not exist in /etc/passwd,
      # set HOME so n8n uses /home/node instead of falling back to '/'.
      - HOME=/home/node
      # Preserve the encryption key from the old SQLite instance so
      # all existing credentials can still be decrypted.
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # Let n8n enforce safe settings file permissions
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      # PostgreSQL database (replaces SQLite - no more 21GB DB in RAM)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      # Prune execution history to prevent DB bloat (keep 7 days, max 10k)
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=7
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=10000
      # Enable task runners now (they will be enabled by default in future
      # n8n releases). Useful for stability and future compatibility.
      - N8N_RUNNERS_ENABLED=true
      # Controls whether Code Node / expressions can access env vars.
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - GENERIC_TIMEZONE=${TZ}
    mem_limit: 4g
    mem_reservation: 512m
    networks:
      - t3_proxy
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      # Mount /home/node to give user 568 ownership of home directory
      - /mnt/fast/appdata/automation/n8n-home:/home/node
      - /mnt/fast/appdata/automation/n8n:/home/node/.n8n
      # Host-backed cache directory: precreate this directory on the TrueNAS
      # host and chown to 568:568 so n8n (running as UID 568) can write to it
      # without failing to mkdir inside the container.
      - /mnt/fast/appdata/automation/n8n/cache:/home/node/.cache
      - /mnt/fast/appdata/automation/n8n/local-files:/data/files
      - /mnt/fast/appdata/automation/n8n/python_scripts:/data/py_scripts
      - /mnt/fast/appdata/automation/n8n/.requirements.txt:/data/requirements.txt
    labels:

      - traefik.enable=true
      - traefik.http.routers.n8n.rule=Host(`n8n.deercrest.info`)
      - traefik.http.routers.n8n.tls=true
      - traefik.http.routers.n8n.entrypoints=web,websecure
      - traefik.http.routers.n8n.tls.certresolver=dns-cloudflare
        #- traefik.http.routers.n8n.service=n8n-svc
      - traefik.http.middlewares.n8n.headers.SSLRedirect=true
      - traefik.http.middlewares.n8n.headers.STSSeconds=315360000
      - traefik.http.middlewares.n8n.headers.browserXSSFilter=true
      - traefik.http.middlewares.n8n.headers.contentTypeNosniff=true
      - traefik.http.middlewares.n8n.headers.forceSTSHeader=true
      - traefik.http.middlewares.n8n.headers.SSLHost=deercrest.info
      - traefik.http.middlewares.n8n.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.n8n.headers.STSPreload=true
      - traefik.http.routers.n8n.middlewares=n8n@docker
        #- traefik.http.routers.n8n.middlewares=chain-authelia@file
      - traefik.http.services.n8n.loadbalancer.server.port=5678

