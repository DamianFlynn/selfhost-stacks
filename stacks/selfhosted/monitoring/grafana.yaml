services:
  grafana:
    image: grafana/grafana:12.4.3
    container_name: grafana
    hostname: grafana
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    networks:
      - t3_proxy
    # ports:
    #   - "3000:3000"  # Uncomment for direct access or expose via Traefik
    volumes:
      - ${APPDATA_DIR}/monitoring/grafana:/var/lib/grafana
      - ./grafana/provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAINNAME}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=${GRAFANA_PLUGINS:-}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=true
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=info
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAINNAME}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      # Grafana has its own auth, no Authelia middleware needed
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

networks:
  t3_proxy:
    external: true
