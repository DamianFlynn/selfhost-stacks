services:
  calcom:
    # renovate: datasource=docker depName=calcom/cal.com
    image: calcom/cal.com:latest
    container_name: calcom
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - t3_proxy
      - saas
    volumes:
      - calcom_uploads:/usr/src/app/public/uploads
    environment:
      # Database
      - DATABASE_URL=postgresql://${CALCOM_POSTGRES_USER:-calcom}:${CALCOM_POSTGRES_PASSWORD}@calcom_postgres:5432/${CALCOM_POSTGRES_DB:-calcom}
      
      # URLs
      - NEXT_PUBLIC_WEBAPP_URL=https://cal.deercrest.info
      - NEXTAUTH_URL=https://cal.deercrest.info
      
      # NextAuth Secret (generate with: openssl rand -base64 32)
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - CALENDSO_ENCRYPTION_KEY=${CALENDSO_ENCRYPTION_KEY}
      
      # Email (SMTP)
      - EMAIL_FROM=${EMAIL_FROM:-noreply@deercrest.info}
      - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST}
      - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-587}
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD}
      
      # Features
      - NEXT_PUBLIC_LICENSE_CONSENT=agree
      - NEXT_PUBLIC_DISABLE_SIGNUP=${DISABLE_SIGNUP:-false}
      - NEXT_PUBLIC_IS_E2E=${IS_E2E:-false}
      
      # Stripe (optional - for payments)
      - STRIPE_PRIVATE_KEY=${STRIPE_PRIVATE_KEY:-}
      - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      
      # Google OAuth (optional calendar integration)
      - GOOGLE_API_CREDENTIALS=${GOOGLE_API_CREDENTIALS:-}
      - GOOGLE_LOGIN_ENABLED=${GOOGLE_LOGIN_ENABLED:-false}
      
      # Microsoft OAuth (optional)
      - MS_GRAPH_CLIENT_ID=${MS_GRAPH_CLIENT_ID:-}
      - MS_GRAPH_CLIENT_SECRET=${MS_GRAPH_CLIENT_SECRET:-}
      
      # Zoom (optional)
      - ZOOM_CLIENT_ID=${ZOOM_CLIENT_ID:-}
      - ZOOM_CLIENT_SECRET=${ZOOM_CLIENT_SECRET:-}
      
      # Time zone
      - TZ=${TZ:-America/New_York}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=t3_proxy"
      
      # HTTP Router (public - no Authelia for booking pages)
      - "traefik.http.routers.calcom.entrypoints=web,websecure"
      - "traefik.http.routers.calcom.rule=Host(`cal.deercrest.info`)"
      - "traefik.http.routers.calcom.service=calcom"
      - "traefik.http.services.calcom.loadbalancer.server.port=3000"
    depends_on:
      calcom_postgres:
        condition: service_healthy

  calcom_postgres:
    image: postgres:17-alpine
    container_name: calcom_postgres
    restart: unless-stopped
    networks:
      - saas
    volumes:
      - calcom_postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${CALCOM_POSTGRES_DB:-calcom}
      - POSTGRES_USER=${CALCOM_POSTGRES_USER:-calcom}
      - POSTGRES_PASSWORD=${CALCOM_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CALCOM_POSTGRES_USER:-calcom} -d ${CALCOM_POSTGRES_DB:-calcom}"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
