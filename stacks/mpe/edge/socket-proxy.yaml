# Docker Socket Proxy - MPE (read-only container discovery for Traefik)
#
# Purpose:
#   Security layer between MPE Traefik and the Docker socket. Exposes only the
#   read-only endpoints Traefik needs for service discovery; blocks the rest.
#
# Access: internal only on mpe_socket_proxy (192.168.93.254:2375). No web access.

services:
  socket-proxy:
    container_name: mpe-socket-proxy
    # renovate: datasource=docker depName=tecnativa/docker-socket-proxy
    image: tecnativa/docker-socket-proxy:v0.4.2
    pull_policy: always
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      mpe_socket_proxy:
        ipv4_address: 192.168.93.254
        aliases:
          - mpe-socket-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LOG_LEVEL=info
      # Granted (read-only discovery)
      - EVENTS=1
      - PING=1
      - VERSION=1
      - CONTAINERS=1
      - NETWORKS=1
      - SERVICES=1
      - TASKS=1
      # Revoked (security critical)
      - AUTH=0
      - SECRETS=0
      - POST=0
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - DISTRIBUTION=0
      - EXEC=0
      - IMAGES=0
      - INFO=0
      - NODES=0
      - PLUGINS=0
      - SESSION=0
      - SWARM=0
      - SYSTEM=0
      - VOLUMES=0
