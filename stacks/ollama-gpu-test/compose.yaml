services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-gpu-test
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"
      - "110"
    ports:
      - "11434:11434"
    volumes:
      - /opt/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
